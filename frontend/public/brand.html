<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAGcontrol — Brand Identity</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0D0D0D;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Switcher bar ── */
  .bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    gap: 8px;
    background: #0D0D0D;
    border-bottom: 1px solid #1e1e1e;
  }

  .bar-label {
    font-size: 11px;
    color: #555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    margin-right: 4px;
  }

  .pill {
    display: flex;
    background: #1a1a1a;
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    border: 1px solid #2a2a2a;
  }

  .pill-btn {
    padding: 8px 22px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.01em;
    transition: all 0.2s ease;
    background: transparent;
    color: #666;
    white-space: nowrap;
  }

  .pill-btn.active-a {
    background: #C8FF00;
    color: #0D0D0D;
  }

  .pill-btn.active-b {
    background: #0A6E50;
    color: #fff;
  }

  /* ── Frame container ── */
  .frames {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  iframe.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
  }

  /* ── Footer hint ── */
  .hint {
    flex-shrink: 0;
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: #333;
    letter-spacing: 0.08em;
    background: #0D0D0D;
  }
</style>
</head>
<body>

<div class="bar">
  <div class="bar-label">TAGcontrol · Brand</div>
  <div class="pill">
    <button class="pill-btn active-a" id="btnA" onclick="show('A')">
      A &nbsp;·&nbsp; Tu elección
    </button>
    <button class="pill-btn" id="btnB" onclick="show('B')">
      B &nbsp;·&nbsp; Expertos
    </button>
  </div>
</div>

<div class="frames">
  <iframe id="frameA" src="/brand-papa.html" title="Propuesta A"></iframe>
  <iframe id="frameB" src="/brand-expertos.html" title="Propuesta B" class="hidden"></iframe>
</div>

<div class="hint">tagcontrol.vercel.app/brand</div>

<script>
  function show(which) {
    const a = which === 'A';
    document.getElementById('frameA').classList.toggle('hidden', !a);
    document.getElementById('frameB').classList.toggle('hidden', a);
    document.getElementById('btnA').className = 'pill-btn' + (a ? ' active-a' : '');
    document.getElementById('btnB').className = 'pill-btn' + (!a ? ' active-b' : '');
  }
</script>

</body>
</html>
