<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TAGcontrol — Motion Logo</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }

  /* Pin */
  .pin-wrap {
    display: inline-block;
    animation: pinDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }
  @keyframes pinDrop {
    0% { transform: translateY(-120px) scale(0.8); opacity: 0; }
    60% { transform: translateY(8px) scale(1.02); opacity: 1; }
    80% { transform: translateY(-4px) scale(0.98); }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* Sombra del pin */
  .shadow {
    width: 48px; height: 8px; margin: 4px auto 0;
    background: radial-gradient(ellipse, rgba(0,0,0,0.12) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowGrow 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }
  @keyframes shadowGrow {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Check stroke animation */
  .check-path {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawCheck 0.5s ease-out 1.2s forwards;
  }
  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  /* Pulse sutil después del check */
  .pulse-ring {
    animation: pulse 0.6s ease-out 1.7s both;
    transform-origin: center;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Texto */
  .text-wrap {
    margin-top: 28px;
    animation: fadeUp 0.6s ease-out 1.8s both;
  }
  @keyframes fadeUp {
    0% { transform: translateY(12px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .brand {
    font-size: 32px;
    font-weight: 700;
    color: #212529;
    letter-spacing: -0.5px;
  }
  .tagline {
    font-size: 15px;
    color: #6C757D;
    margin-top: 6px;
    animation: fadeUp 0.5s ease-out 2.3s both;
  }
</style>
</head>
<body>
<div class="container">
  <!-- Pin animado -->
  <div class="pin-wrap">
    <svg width="100" height="130" viewBox="0 0 512 620">
      <!-- Pulse ring (behind pin) -->
      <circle class="pulse-ring" cx="256" cy="206" r="80" fill="none" stroke="#A7F3D0" stroke-width="4"/>
      <!-- Pin body -->
      <path d="M256 80c-70 0-126 56-126 126 0 90 126 210 126 210s126-120 126-210c0-70-56-126-126-126z"
            fill="#2D6A4F"/>
      <!-- Inner circle -->
      <circle cx="256" cy="206" r="56" fill="#1B4332"/>
      <!-- Check -->
      <path class="check-path" d="M224 210 L246 232 L292 180"
            fill="none" stroke="#A7F3D0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="shadow"></div>

  <!-- Texto -->
  <div class="text-wrap">
    <div class="brand">TAGcontrol</div>
    <div class="tagline">Tu peaje, bajo control</div>
  </div>
</div>
</body>
</html>
